# Render Blueprint — deploy backend API (free tier)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: magil-clinic-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run db:seed
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./data/dev.db
      - key: CORS_ORIGIN
        value: https://magil-clinic.pages.dev,http://localhost:3000
      - key: JWT_SECRET
        generateValue: true
